<svg xmlns="http://www.w3.org/2000/svg" width="420" height="160" viewBox="0 0 420 160">

  <!-- Background -->
  <rect x="5" y="5" width="410" height="150" rx="12"
        fill="#e6e6e6" stroke="#000" stroke-width="3"/>

  <!-- Company Name -->
  <text x="210" y="45" text-anchor="middle"
        font-size="28" font-weight="bold" fill="#000"
        font-family="Arial, sans-serif">
    CODEWITHSETH &amp; CO
  </text>

  <!-- Date (Dynamic placeholder) -->
  <text x="210" y="85" text-anchor="middle"
        font-size="26" font-weight="600" fill="#000"
        font-family="Georgia, serif">
    {{date}}
  </text>

  <!-- Address (Dynamic placeholder) -->
  <text x="210" y="115" text-anchor="middle"
        font-size="18" font-weight="600" fill="#000"
        font-family="Arial, sans-serif">
    {{poBox}}
  </text>

  <!-- Email (Dynamic placeholder) -->
  <text x="210" y="140" text-anchor="middle"
        font-size="14" fill="#333"
        font-family="Arial, sans-serif">
    {{email}}
  </text>

</svg>
